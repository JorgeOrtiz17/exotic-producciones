kind = "web"
previewPath = "/"
title = "Exotic Events Landing"
version = "1.0.0"
id = "artifacts/exotic-events"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25411

[services.development]
run = "pnpm --filter @workspace/exotic-events run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/exotic-events", "run", "build" ]
publicDir = "artifacts/exotic-events/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25411"
BASE_PATH = "/"
